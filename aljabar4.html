<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materi Aljabar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#e7e7e7;
overflow-x:hidden;
}

/* ===== WAVE BACKGROUND ===== */
.wave-bg{
position:absolute;
inset:0;
z-index:-2;
overflow:hidden;
pointer-events:none;
}

.wave-bg svg{
position:absolute;
width:100%;
left:0;
}

.wave-top{top:0;height:300px;}
.wave-bottom{bottom:-80px;height:350px;}

/* ===== HEADER (STICKY) ===== */
header{
height:90px;
background:linear-gradient(90deg,#ff8c42,#f2b66d);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
color:white;

/* 🔥 STICKY */
position:sticky;
top:0;
z-index:999;
}

header img{width:80px;}
header p{font-size:12px;letter-spacing:2px;}

/* HERO */
.hero{
position:relative;
min-height:100vh;
padding:60px 80px;
overflow:hidden;
z-index:1;
}

/* LABEL */
.label{
background:#ff8c42;
color:white;
display:inline-block;
padding:14px 40px;
border-radius:40px;
font-weight:600;
margin-bottom:20px;
}

/* EXIT CARD */
.exit{
position:absolute;
top:45px;
right:80px;
background:#ff8c42;
border-radius:24px;
padding:16px 24px;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
color:white;
font-weight:600;
text-decoration:none;
font-size:16px;
box-shadow:0 12px 28px rgba(0,0,0,0.3);
transition:0.25s;
z-index:998;
}

.exit img{width:56px;}

.exit:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

.exit:active{transform:scale(0.92);}

/* CONTENT */
.content-box{
background:#f39a5b;
border-radius:40px;
padding:60px;
color:white;
margin-top:20px;
min-height:420px;
position:relative;
overflow:hidden;
}

.content-box::after{
content:"";
position:absolute;
bottom:-80px;
left:0;
width:100%;
height:200px;
background:rgba(255,255,255,0.08);
border-top-left-radius:60% 100%;
border-top-right-radius:60% 100%;
}

.content-box h2{
font-size:60px;
margin-bottom:20px;
}

.content-box p{
font-size:14px;
line-height:1.8;
}

/* NAV */
.nav-buttons{
display:flex;
justify-content:space-between;
margin-top:30px;
}

.nav-buttons a{
background:#ff8c42;
color:white;
text-decoration:none;
padding:18px 50px;
border-radius:40px;
font-weight:600;
font-size:22px;
transition:0.2s;
}

.nav-buttons a:hover{transform:translateY(-5px);}
.nav-buttons a:active{transform:scale(0.9);}
</style>
</head>

<body>

<header>
<img src="img/logo.png">
<p>DESIGNED BY TECHONE</p>
</header>

<section class="hero">

<!-- WAVE BACKGROUND -->
<div class="wave-bg">
<svg class="wave-top" viewBox="0 0 1440 320" preserveAspectRatio="none">
<path fill="#ff8c42" fill-opacity="0.35"
d="M0,192L60,176C120,160,240,128,360,128C480,128,600,160,720,170.7C840,181,960,171,1080,165.3C1200,160,1320,160,1380,160L1440,160V0H0Z"/>
</svg>

<svg class="wave-bottom" viewBox="0 0 1440 320" preserveAspectRatio="none">
<path fill="#f2b66d" fill-opacity="0.35"
d="M0,96L60,112C120,128,240,160,360,165.3C480,171,600,149,720,138.7C840,128,960,128,1080,149.3C1200,171,1320,213,1380,234.7L1440,256V320H0Z"/>
</svg>
</div>

<!-- EXIT CARD -->
<a href="materi.html" class="exit">
<img src="img/exit.png" alt="Exit">
<span>EXIT</span>
</a>

<div class="label">MATERI ALJABAR</div>

<div class="content-box">

<p>



<h3>9. Aplikasi Turunan Aljabar</h3>
Digunakan dalam optimasi (maksimum/minimum), kecepatan dan percepatan, serta berbagai masalah matematika terapan.
</p>
</div>

<div class="nav-buttons">
<a href="aljabar2.html">PREVIOUS</a>
<a href="aljabar4.html">NEXT</a>
</div>

</section>

</body>
</html>
